name: Backend CI

on:
  pull_request:
    paths:
      - "apps/backend/**"
      - "packages/api/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - "tsconfig.base.json"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
    paths:
      - "apps/backend/**"
      - "packages/api/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - "tsconfig.base.json"
      - ".github/workflows/backend-ci.yml"

jobs:
  verify-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck shared package
        run: pnpm -C packages/shared typecheck

      - name: Typecheck API package
        run: pnpm -C packages/api typecheck

      - name: Typecheck backend
        run: pnpm -C apps/backend typecheck

      - name: Backend tests
        run: pnpm -C apps/backend test

      - name: Build backend
        run: pnpm -C apps/backend build
