name: Backend CI

on:
  pull_request:
    paths:
      - "apps/backend/**"
      - "packages/api/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - "tsconfig.base.json"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read
  attestations: write
  id-token: write
  push:
    branches:
      - main
    paths:
      - "apps/backend/**"
      - "packages/api/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - "tsconfig.base.json"
      - ".github/workflows/backend-ci.yml"

jobs:
  verify-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit (high+)
        run: pnpm audit --audit-level high

      - name: Typecheck shared package
        run: pnpm -C packages/shared typecheck

      - name: Typecheck API package
        run: pnpm -C packages/api typecheck

      - name: Typecheck backend
        run: pnpm -C apps/backend typecheck

      - name: Backend tests
        run: pnpm -C apps/backend test

      - name: Build backend
        run: pnpm -C apps/backend build

      - name: Generate SBOM
        run: pnpm dlx @cyclonedx/cyclonedx-npm --output-file sbom-backend.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-sbom
          path: sbom-backend.json
          if-no-files-found: error

      - name: Attest backend build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            apps/backend/dist/**
            sbom-backend.json
